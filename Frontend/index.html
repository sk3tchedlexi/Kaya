<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="theme-light">
    <div class="bg" id="bg"></div>
    <div class="bg-overlay"></div>
    <div id="floating-tooltip"></div>

    <!-- Confirm modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal glass">
        <div class="modal-title" id="modal-title">—</div>
        <div class="modal-body" id="modal-body">—</div>
        <div class="modal-actions">
          <button class="modal-btn cancel-btn" onclick="closeModal()">
            Cancel
          </button>
          <button class="modal-btn confirm-btn" id="modal-confirm">
            Confirm
          </button>
        </div>
      </div>
    </div>

    <!-- Settings panel -->
    <div
      class="settings-overlay"
      id="settings-overlay"
      onclick="closeSettings(event)"
    >
      <div class="settings-panel glass" id="settings-panel">
        <div class="settings-title">Settings</div>

        <div class="settings-section">
          <div class="settings-label">Refresh interval</div>
          <div class="interval-options">
            <button class="interval-btn" data-ms="1000">1s</button>
            <button class="interval-btn" data-ms="2000">2s</button>
            <button class="interval-btn" data-ms="5000">5s</button>
            <button class="interval-btn active" data-ms="10000">10s</button>
            <button class="interval-btn" data-ms="30000">30s</button>
            <button class="interval-btn" data-ms="60000">1m</button>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-label">Theme</div>
          <div class="theme-toggle">
            <button
              class="theme-btn active"
              id="theme-light-btn"
              onclick="setTheme('light')"
            >
              Light
            </button>
            <button
              class="theme-btn"
              id="theme-dark-btn"
              onclick="setTheme('dark')"
            >
              Dark
            </button>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-label">Wallpaper</div>
          <label class="wallpaper-btn" for="wallpaper-input"
            >Choose image</label
          >
          <input
            type="file"
            id="wallpaper-input"
            accept="image/*"
            style="display: none"
            onchange="uploadWallpaper(event)"
          />
          <button class="wallpaper-reset-btn" onclick="resetWallpaper()">
            Reset to default
          </button>
        </div>
      </div>
    </div>

    <div class="dashboard">
      <!-- Header -->
      <div class="glass header">
        <div class="header-left">
          <div class="tooltip-wrap" id="dot-wrap">
            <div class="status-dot offline" id="status-dot"></div>
          </div>
          <img
            src="assets/brand/kaya-logo-light.svg"
            alt="Kaya"
            class="logo"
            id="header-logo"
          />
          <div class="tab-bar">
            <button class="tab active" onclick="switchTab('overview')">
              Overview
            </button>
            <button class="tab" onclick="switchTab('docker')">Docker</button>
            <button class="tab" onclick="switchTab('processes')">
              Processes
            </button>
          </div>
        </div>
        <div class="header-right">
          <div class="header-meta">
            <div>
              <div class="uptime-label">Uptime</div>
              <div class="uptime-val" id="uptime-display">—</div>
            </div>
            <div class="header-divider"></div>
            <div>
              <div class="uptime-label">Last update</div>
              <div class="uptime-val" id="time-display">—</div>
            </div>
            <div class="header-divider"></div>
            <div class="header-actions">
              <div class="tooltip-wrap" id="restart-wrap">
                <button
                  class="action-btn restart-btn"
                  onclick="confirmAction('restart')"
                >
                  Restart
                </button>
              </div>
              <div class="tooltip-wrap" id="shutdown-wrap">
                <button
                  class="action-btn shutdown-btn"
                  onclick="confirmAction('shutdown')"
                >
                  Shutdown
                </button>
              </div>
              <button
                class="cog-btn"
                id="cog-btn"
                onclick="toggleSettings()"
                aria-label="Settings"
              >
                <img
                  src="assets/cog.svg"
                  width="15"
                  height="15"
                  alt="Settings"
                  class="cog-icon"
                />
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Overview -->
      <div class="tab-content active" id="tab-overview">
        <div class="stat-row">
          <div class="glass stat-card cpu">
            <div>
              <div class="stat-label">CPU Usage</div>
              <div class="stat-val" id="cpu-val">—</div>
              <div class="stat-sub" id="cpu-sub">—</div>
            </div>
            <div class="bar-track">
              <div class="bar-fill" id="cpu-bar" style="width: 0%"></div>
            </div>
          </div>
          <div class="glass stat-card gpu">
            <div>
              <div class="stat-label">GPU Usage</div>
              <div class="stat-val" id="gpu-val">—</div>
              <div class="stat-sub" id="gpu-sub">—</div>
            </div>
            <div class="bar-track">
              <div class="bar-fill" id="gpu-bar" style="width: 0%"></div>
            </div>
          </div>
          <div class="glass stat-card ram">
            <div>
              <div class="stat-label">RAM Usage</div>
              <div class="stat-val" id="ram-val">—</div>
              <div class="stat-sub" id="ram-sub">—</div>
            </div>
            <div class="bar-track">
              <div class="bar-fill" id="ram-bar" style="width: 0%"></div>
            </div>
          </div>
          <div class="glass stat-card disk">
            <div>
              <div class="stat-label">Disk Usage</div>
              <div class="stat-val" id="disk-val">—</div>
              <div class="stat-sub" id="disk-sub">—</div>
            </div>
            <div class="bar-track">
              <div class="bar-fill" id="disk-bar" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <div class="chart-row">
          <div class="glass chart-card">
            <div class="chart-header">
              <span class="chart-title">CPU history</span>
              <span class="chart-cur" id="cpu-cur" style="color: #2563eb"
                >—</span
              >
            </div>
            <div class="chart-wrap"><canvas id="cpu-chart"></canvas></div>
          </div>
          <div class="glass chart-card">
            <div class="chart-header">
              <span class="chart-title">GPU history</span>
              <span class="chart-cur" id="gpu-cur" style="color: #7c3aed"
                >—</span
              >
            </div>
            <div class="chart-wrap"><canvas id="gpu-chart"></canvas></div>
          </div>
          <div class="glass chart-card">
            <div class="chart-header">
              <span class="chart-title">RAM history</span>
              <span class="chart-cur" id="ram-cur" style="color: #059669"
                >—</span
              >
            </div>
            <div class="chart-wrap"><canvas id="ram-chart"></canvas></div>
          </div>
          <div class="glass chart-card">
            <div class="chart-header">
              <span class="chart-title">Disk I/O (MB/s)</span>
              <span class="chart-cur" id="disk-cur" style="color: #d97706"
                >—</span
              >
            </div>
            <div class="chart-wrap"><canvas id="disk-chart"></canvas></div>
          </div>
        </div>

        <div class="bottom-row">
          <div class="glass temp-card">
            <div class="temp-label">CPU Temp</div>
            <div class="temp-val good" id="cpu-temp">—</div>
            <div class="temp-bar-track">
              <div
                class="temp-bar-fill good"
                id="cpu-temp-bar"
                style="width: 0%"
              ></div>
            </div>
          </div>
          <div class="glass temp-card">
            <div class="temp-label">GPU Temp</div>
            <div class="temp-val good" id="gpu-temp">—</div>
            <div class="temp-bar-track">
              <div
                class="temp-bar-fill good"
                id="gpu-temp-bar"
                style="width: 0%"
              ></div>
            </div>
          </div>
          <div class="glass temp-card">
            <div class="temp-label">NVMe Temp</div>
            <div class="temp-val good" id="nvme-temp">—</div>
            <div class="temp-bar-track">
              <div
                class="temp-bar-fill good"
                id="nvme-temp-bar"
                style="width: 0%"
              ></div>
            </div>
          </div>
          <div class="glass temp-card">
            <div class="temp-label">Motherboard</div>
            <div class="temp-val good" id="mb-temp">—</div>
            <div class="temp-bar-track">
              <div
                class="temp-bar-fill good"
                id="mb-temp-bar"
                style="width: 0%"
              ></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Docker -->
      <div class="tab-content" id="tab-docker">
        <div class="glass panel-card">
          <table class="data-table">
            <thead>
              <tr>
                <th>Container</th>
                <th>Image</th>
                <th>Status</th>
                <th>Running for</th>
              </tr>
            </thead>
            <tbody id="docker-body">
              <tr>
                <td colspan="4" class="empty-row">—</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Tab: Processes -->
      <div class="tab-content" id="tab-processes">
        <div class="glass panel-card">
          <div class="panel-toolbar">
            <button
              class="sort-btn active"
              id="sort-cpu-btn"
              onclick="setProcessSort('cpu')"
            >
              Top CPU
            </button>
            <button
              class="sort-btn"
              id="sort-ram-btn"
              onclick="setProcessSort('ram')"
            >
              Top RAM
            </button>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>PID</th>
                <th>Name</th>
                <th>CPU %</th>
                <th>RAM</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="process-body">
              <tr>
                <td colspan="5" class="empty-row">—</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:9783/api/metrics";
      const BASE = "http://localhost:9783";
      const HIST = 40;
      const makeH = () => Array(HIST).fill(null);

      let cpuH = makeH(),
        gpuH = makeH(),
        ramH = makeH(),
        ioH = makeH();
      let processSort = "cpu";
      let lastData = null;
      let tickInterval = null;

      // ── Settings ──────────────────────────────────────────
      const DEFAULTS = { interval: 10000, theme: "light", wallpaper: null };

      function loadSettings() {
        return {
          interval: parseInt(
            localStorage.getItem("kaya_interval") || DEFAULTS.interval,
          ),
          theme: localStorage.getItem("kaya_theme") || DEFAULTS.theme,
          wallpaper:
            localStorage.getItem("kaya_wallpaper") || DEFAULTS.wallpaper,
        };
      }

      function applySettings(settings) {
        // Interval
        clearInterval(tickInterval);
        tickInterval = setInterval(tick, settings.interval);
        document.querySelectorAll(".interval-btn").forEach((b) => {
          b.classList.toggle(
            "active",
            parseInt(b.dataset.ms) === settings.interval,
          );
        });

        // Theme
        document.body.className = "theme-" + settings.theme;
        document
          .getElementById("theme-light-btn")
          .classList.toggle("active", settings.theme === "light");
        document
          .getElementById("theme-dark-btn")
          .classList.toggle("active", settings.theme === "dark");
        document.getElementById("header-logo").src =
          settings.theme === "dark"
            ? "assets/brand/kaya-logo-white.svg"
            : "assets/brand/kaya-logo-light.svg";

        // Wallpaper
        const bg = document.getElementById("bg");
        if (settings.wallpaper) {
          bg.style.backgroundImage = `url('${settings.wallpaper}')`;
        } else {
          bg.style.backgroundImage = "url('assets/wallpaper.jpg')";
        }
      }

      function setInterval_(ms) {
        localStorage.setItem("kaya_interval", ms);
        applySettings(loadSettings());
      }

      function setTheme(theme) {
        localStorage.setItem("kaya_theme", theme);
        applySettings(loadSettings());
      }

      function uploadWallpaper(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          localStorage.setItem("kaya_wallpaper", e.target.result);
          applySettings(loadSettings());
        };
        reader.readAsDataURL(file);
      }

      function resetWallpaper() {
        localStorage.removeItem("kaya_wallpaper");
        applySettings(loadSettings());
      }

      function toggleSettings() {
        document.getElementById("settings-overlay").classList.toggle("visible");
      }

      function closeSettings(event) {
        if (event.target === document.getElementById("settings-overlay")) {
          document
            .getElementById("settings-overlay")
            .classList.remove("visible");
        }
      }

      document.querySelectorAll(".interval-btn").forEach((btn) => {
        btn.addEventListener("click", () =>
          setInterval_(parseInt(btn.dataset.ms)),
        );
      });

      // ── Charts ────────────────────────────────────────────
      const chartOpts = (color, maxY, sfx) => ({
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 350 },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false },
          y: {
            display: true,
            min: 0,
            max: maxY,
            grid: { color: "rgba(28,24,48,0.07)", drawBorder: false },
            ticks: {
              color: "rgba(28,24,48,0.3)",
              font: { family: "JetBrains Mono", size: 8 },
              maxTicksLimit: 3,
              callback: (v) => v + sfx,
            },
          },
        },
        elements: {
          point: { radius: 0 },
          line: { tension: 0.4, borderWidth: 1.5 },
        },
      });

      const mkChart = (id, color, maxY, sfx) =>
        new Chart(document.getElementById(id), {
          type: "line",
          data: {
            labels: Array(HIST).fill(""),
            datasets: [
              {
                data: Array(HIST).fill(null),
                borderColor: color,
                backgroundColor: color + "22",
                fill: true,
                spanGaps: false,
              },
            ],
          },
          options: chartOpts(color, maxY, sfx),
        });

      const cpuChart = mkChart("cpu-chart", "#2563eb", 100, "%");
      const gpuChart = mkChart("gpu-chart", "#7c3aed", 100, "%");
      const ramChart = mkChart("ram-chart", "#059669", 100, "%");
      const diskChart = mkChart("disk-chart", "#d97706", 250, "");

      // ── Helpers ───────────────────────────────────────────
      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function pushChart(chart, hist, val) {
        hist.shift();
        hist.push(val);
        chart.data.datasets[0].data = [...hist];
        chart.update("none");
      }

      function setTemp(elId, barId, val, warn, danger, max) {
        const el = document.getElementById(elId);
        const bar = document.getElementById(barId);
        if (val === null || val === undefined) {
          el.textContent = "—";
          el.className = "temp-val good";
          bar.style.width = "0%";
          bar.className = "temp-bar-fill good";
          return;
        }
        const cls = val >= danger ? "danger" : val >= warn ? "warn" : "good";
        el.textContent = val + "°C";
        el.className = "temp-val " + cls;
        bar.style.width = clamp((val / max) * 100, 0, 100) + "%";
        bar.className = "temp-bar-fill " + cls;
      }

      function fmtUptime(secs) {
        if (!secs && secs !== 0) return "—";
        const d = Math.floor(secs / 86400);
        const h = Math.floor((secs % 86400) / 3600);
        const m = Math.floor((secs % 3600) / 60);
        return (
          d +
          "d " +
          String(h).padStart(2, "0") +
          "h " +
          String(m).padStart(2, "0") +
          "m"
        );
      }

      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));
        document
          .querySelector(`.tab[onclick="switchTab('${tab}')"]`)
          .classList.add("active");
        document.getElementById("tab-" + tab).classList.add("active");
      }

      function setProcessSort(sort) {
        processSort = sort;
        document
          .getElementById("sort-cpu-btn")
          .classList.toggle("active", sort === "cpu");
        document
          .getElementById("sort-ram-btn")
          .classList.toggle("active", sort === "ram");
        if (lastData) renderProcesses(lastData.processes);
      }

      function renderDocker(containers) {
        const tbody = document.getElementById("docker-body");
        if (!containers || containers.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="4" class="empty-row">No containers found</td></tr>';
          return;
        }
        tbody.innerHTML = containers
          .map(
            (c) => `
    <tr>
      <td class="td-name">${c.name}</td>
      <td class="td-mono">${c.image}</td>
      <td><span class="status-pill ${c.status}">${c.status}</span></td>
      <td class="td-mono td-muted">${c.running_for}</td>
    </tr>`,
          )
          .join("");
      }

      function renderProcesses(procs) {
        const tbody = document.getElementById("process-body");
        const list = processSort === "cpu" ? procs.by_cpu : procs.by_ram;
        if (!list || list.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" class="empty-row">No processes found</td></tr>';
          return;
        }
        tbody.innerHTML = list
          .map(
            (p) => `
    <tr>
      <td class="td-mono td-muted">${p.pid}</td>
      <td class="td-name">${p.name}</td>
      <td class="td-mono">${p.cpu}%</td>
      <td class="td-mono">${p.ram_mb} MB <span class="td-muted">(${p.ram_pct}%)</span></td>
      <td><span class="status-pill ${p.status === "running" ? "running" : "stopped"}">${p.status}</span></td>
    </tr>`,
          )
          .join("");
      }

      function clearDisplay() {
        document.getElementById("status-dot").className = "status-dot offline";
        document.getElementById("dot-wrap")._tooltipText = "Not connected";
        [
          "cpu-val",
          "gpu-val",
          "ram-val",
          "disk-val",
          "cpu-sub",
          "gpu-sub",
          "ram-sub",
          "disk-sub",
          "cpu-cur",
          "gpu-cur",
          "ram-cur",
          "disk-cur",
          "uptime-display",
        ].forEach((id) => {
          document.getElementById(id).textContent = "—";
        });
        ["cpu-bar", "gpu-bar", "ram-bar", "disk-bar"].forEach((id) => {
          document.getElementById(id).style.width = "0%";
        });
        setTemp("cpu-temp", "cpu-temp-bar", null, 0, 0, 100);
        setTemp("gpu-temp", "gpu-temp-bar", null, 0, 0, 100);
        setTemp("nvme-temp", "nvme-temp-bar", null, 0, 0, 80);
        setTemp("mb-temp", "mb-temp-bar", null, 0, 0, 80);
        pushChart(cpuChart, cpuH, null);
        pushChart(gpuChart, gpuH, null);
        pushChart(ramChart, ramH, null);
        pushChart(diskChart, ioH, null);
      }

      function applyMetrics(d) {
        lastData = d;
        document.getElementById("status-dot").className = "status-dot online";
        document.getElementById("dot-wrap")._tooltipText = "Connected";

        const cpu = Math.round(d.cpu.percent);
        document.getElementById("cpu-val").textContent = cpu + "%";
        document.getElementById("cpu-bar").style.width = cpu + "%";
        document.getElementById("cpu-sub").textContent =
          d.cpu.cores + " cores — " + d.cpu.model;
        document.getElementById("cpu-cur").textContent = cpu + "%";
        pushChart(cpuChart, cpuH, cpu);

        if (d.gpu) {
          const gpu = Math.round(d.gpu.percent);
          document.getElementById("gpu-val").textContent = gpu + "%";
          document.getElementById("gpu-bar").style.width = gpu + "%";
          document.getElementById("gpu-sub").textContent =
            "VRAM: " +
            d.gpu.vram_used_gb.toFixed(1) +
            " / " +
            d.gpu.vram_total_gb.toFixed(1) +
            " GB";
          document.getElementById("gpu-cur").textContent = gpu + "%";
          pushChart(gpuChart, gpuH, gpu);
        } else {
          document.getElementById("gpu-val").textContent = "N/A";
          document.getElementById("gpu-sub").textContent = "No NVIDIA GPU";
          document.getElementById("gpu-cur").textContent = "—";
          pushChart(gpuChart, gpuH, null);
        }

        const ram = Math.round(d.ram.percent);
        document.getElementById("ram-val").textContent = ram + "%";
        document.getElementById("ram-bar").style.width = ram + "%";
        document.getElementById("ram-sub").textContent =
          d.ram.used_gb.toFixed(1) + " / " + d.ram.total_gb.toFixed(1) + " GB";
        document.getElementById("ram-cur").textContent = ram + "%";
        pushChart(ramChart, ramH, ram);

        const disk = Math.round(d.disk.percent);
        document.getElementById("disk-val").textContent = disk + "%";
        document.getElementById("disk-bar").style.width = disk + "%";
        document.getElementById("disk-sub").textContent =
          d.disk.used_tb.toFixed(2) +
          " / " +
          d.disk.total_tb.toFixed(2) +
          " TB";
        const io = Math.round(d.disk.read_mbps + d.disk.write_mbps);
        document.getElementById("disk-cur").textContent = io + " MB/s";
        pushChart(diskChart, ioH, io);

        setTemp("cpu-temp", "cpu-temp-bar", d.temps.cpu_c, 70, 85, 100);
        setTemp("gpu-temp", "gpu-temp-bar", d.temps.gpu_c, 75, 90, 100);
        setTemp("nvme-temp", "nvme-temp-bar", d.temps.nvme_c, 55, 70, 80);
        setTemp("mb-temp", "mb-temp-bar", d.temps.motherboard_c, 55, 70, 80);

        document.getElementById("uptime-display").textContent = fmtUptime(
          d.uptime_seconds,
        );
        renderDocker(d.docker);
        renderProcesses(d.processes);
      }

      function confirmAction(action) {
        const isShutdown = action === "shutdown";
        document.getElementById("modal-title").textContent = isShutdown
          ? "Shut down server?"
          : "Restart server?";
        document.getElementById("modal-body").textContent = isShutdown
          ? "The server will power off. You will need physical access to turn it back on."
          : "The server will reboot. The dashboard will reconnect automatically.";
        const btn = document.getElementById("modal-confirm");
        btn.textContent = isShutdown ? "Shut down" : "Restart";
        btn.className =
          "modal-btn confirm-btn " +
          (isShutdown ? "shutdown-confirm" : "restart-confirm");
        btn.onclick = () => executeAction(action);
        document.getElementById("modal-overlay").classList.add("visible");
      }

      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("visible");
      }

      async function executeAction(action) {
        closeModal();
        try {
          await fetch(BASE + "/api/" + action, { method: "POST" });
        } catch {}
      }

      async function tick() {
        document.getElementById("time-display").textContent =
          new Date().toLocaleTimeString();
        try {
          const res = await fetch(API);
          if (!res.ok) throw new Error();
          applyMetrics(await res.json());
        } catch {
          clearDisplay();
        }
      }

      // ── Floating tooltip ──────────────────────────────────
      const ftip = document.getElementById("floating-tooltip");

      function setupTooltip(wrapId, text, position) {
        const wrap = document.getElementById(wrapId);
        wrap.addEventListener("mouseenter", () => {
          ftip.textContent = wrap._tooltipText || text;
          ftip.style.display = "block";
          const r = wrap.getBoundingClientRect();
          if (position === "above") {
            ftip.style.top = "";
            ftip.style.bottom = window.innerHeight - r.top + 8 + "px";
          } else {
            ftip.style.bottom = "";
            ftip.style.top = r.bottom + 8 + "px";
          }
          const tipW = ftip.offsetWidth;
          let left = r.left;
          if (left + tipW > window.innerWidth - 8)
            left = window.innerWidth - tipW - 8;
          ftip.style.left = left + "px";
          ftip.style.opacity = "1";
        });
        wrap.addEventListener("mouseleave", () => {
          ftip.style.opacity = "0";
          ftip.style.display = "none";
        });
      }

      setupTooltip("dot-wrap", "Not connected", "above");
      setupTooltip(
        "restart-wrap",
        "Reboots the server. Dashboard will reconnect automatically.",
        "below",
      );
      setupTooltip(
        "shutdown-wrap",
        "Powers off the server. Physical access needed to restart.",
        "below",
      );
      document.getElementById("dot-wrap")._tooltipText = "Not connected";

      // ── Boot ──────────────────────────────────────────────
      applySettings(loadSettings());
      tick();
    </script>
  </body>
</html>
